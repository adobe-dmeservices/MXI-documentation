<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MXI Builder</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html">MXI Builder</a>
    <nav class="nav-links">
      <a href="https://github.com/adobe-dmeservices/MXI-documentation">Documentation on GitHub</a>
    </nav>
  </header>

  <main class="builder-layout">
    <aside class="builder-sidebar">
      <h2>Steps</h2>
      <ol id="step-list"></ol>
      <p class="help" style="margin-top: 1rem;">Work through each section to build your <code>.mxi</code> file line by line. The XML preview updates live.</p>
      <div class="sidebar-actions">
        <input type="file" id="mxi-upload-input" accept=".mxi,.xml,text/xml,application/xml" hidden>
        <button type="button" class="btn-secondary" id="btn-upload-mxi">Upload .mxi to edit</button>
        <button type="button" class="btn-secondary" id="btn-load-example">Load Wedia example</button>
      </div>
      <p class="help import-status" id="import-status" hidden></p>
    </aside>

    <section class="builder-panel">
      <div class="panel-header">
        <h1 id="step-title"></h1>
        <p id="step-hint"></p>
      </div>
      <form id="wizard-form" onsubmit="return false;"></form>
      <div class="wizard-footer">
        <button type="button" class="btn-secondary" id="btn-prev">Back</button>
        <button type="button" class="btn-primary" id="btn-next">Next</button>
      </div>
    </section>

    <aside class="preview-panel">
      <div class="preview-header">
        <h2>Live XML preview</h2>
        <div class="preview-actions">
          <button type="button" class="btn-secondary" id="btn-copy">Copy XML</button>
          <button type="button" class="btn-primary" id="btn-download">Download .mxi</button>
        </div>
      </div>
      <pre id="xml-preview"></pre>
    </aside>
  </main>

  <script type="module" src="assets/builder.js"></script>
</body>
</html>
